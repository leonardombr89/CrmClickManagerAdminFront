name: Deploy Admin Frontend (Lightsail)

on:
  workflow_run:
    workflows: ["Build and publish admin frontend Docker image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ vars.CLICKMANAGER_ADMIN_DEPLOY_PATH || '/opt/clickmanager-admin' }}
      COMPOSE_FILE: docker-compose.prod.yml
      SERVICE_NAME: admin-frontend

    steps:
      - name: Deploy via SSH to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ env.DEPLOY_PATH }}"
            docker compose -f "${{ env.COMPOSE_FILE }}" pull "${{ env.SERVICE_NAME }}"
            docker compose -f "${{ env.COMPOSE_FILE }}" up -d "${{ env.SERVICE_NAME }}"
