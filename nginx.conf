server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index /painel-admin/index.html;

    location = /painel-admin {
        return 301 /painel-admin/;
    }

    # SPA Angular servida sob /painel-admin com suporte a deep link (refresh)
    location /painel-admin/ {
        try_files $uri $uri/ /painel-admin/index.html;
    }

    # Backends no mesmo domínio (ajuste upstreams conforme ambiente)
    # location /api/  { proxy_pass http://backend:8080/api/; }
    # location /auth/ { proxy_pass http://backend:8080/auth/; }
}
